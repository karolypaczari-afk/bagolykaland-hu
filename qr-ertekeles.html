<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>BagolykaLand – Google Értékelés QR-kód</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      border: 2px solid #E0F5F3;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 900;
      color: #1D3557;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 0.85rem;
      color: #2B746D;
      margin-bottom: 2rem;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    #qrcode canvas,
    #qrcode img {
      border-radius: 12px;
      border: 6px solid #E0F5F3;
    }

    .stars {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    .cta-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1D3557;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .cta-sub {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #E0F5F3;
      margin: 1.5rem 0;
    }

    .url-label {
      font-size: 0.7rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.35rem;
    }

    .url-text {
      font-size: 0.75rem;
      color: #2B746D;
      word-break: break-all;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ccc; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-text">BagolykaLand</div>
    <div class="tagline">Oktató- és Fejlesztő Központ · Debrecen</div>

    <div id="qrcode"></div>

    <div class="stars">⭐⭐⭐⭐⭐</div>
    <div class="cta-title">Írja le tapasztalatát!</div>
    <div class="cta-sub">
      Ha hasznosnak találta a munkánkat, kérjük ossza meg véleményét Google-on –<br>
      sokat jelent más szülőknek is.
    </div>

    <hr class="divider" />
    <div class="url-label">Vagy nyissa meg közvetlenül</div>
    <div class="url-text" id="review-url"></div>
  </div>

  <script>
    var reviewUrl = "https://search.google.com/local/writereview?placeid=ChIJiz_Kxg8OdEcRYnpb7s69mME";

    document.getElementById("review-url").textContent = reviewUrl;

    new QRCode(document.getElementById("qrcode"), {
      text: reviewUrl,
      width: 220,
      height: 220,
      colorDark: "#1D3557",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
